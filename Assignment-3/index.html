<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 200px);
      gap: 30px;
    }

    .card {
      text-align: center;
    }

    .card img {
      width: 200px;
      height: 280px;
      object-fit: cover;
      display: block;
    }

    .card h3 {
      margin: 10px 0 4px;
      font-size: 15px;
    }

    .card p {
      margin: 0 0 8px;
      font-size: 13px;
      color: #333;
    }

    .card button {
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
    }

    .card button:hover {
      background-color: #1558b0;
    }
  </style>
</head>
<body>

  <div class="grid">

    <div class="card">
      <img src="1.jpg" alt="Doctor Strange 2">
      <h3>Doctor Strange 2</h3>
      <p>Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="2.jpg" alt="Bhool Bhulaiyaa 2">
      <h3>Bhool Bhulaiyaa 2</h3>
      <p>Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="3.jpg" alt="Jayeshbhai Jordaar">
      <h3>Jayeshbhai Jordaar</h3>
      <p>Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="4.jpg" alt="Jurassic World">
      <h3>Jurassic World</h3>
      <p>Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="5.jpg" alt="KGF2">
      <h3>KGF2</h3>
      <p>Rating: 4.5</p>
      <button>Book now</button>
    </div>

    <div class="card">
      <img src="6.jpg" alt="RRR">
      <h3>RRR</h3>
      <p>Rating: 4.5</p>
      <button>Book now</button>
    </div>

  </div>

</body>
</html>
